spring.application.name=BookingService
server.port=9091

logging.level.root=DEBUG
#configuration MySql Database
spring.datasource.url=jdbc:mysql://localhost:3307/ticketing
spring.datasource.username=root
#spring.datasource.password=12345
spring.jpa.datasource.driver-class-name=com.mysql.jdbc.Driver
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none

inventory.services.url=http://localhost:9090/api/v1/inventory


#Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.template.default-topic=booking
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer